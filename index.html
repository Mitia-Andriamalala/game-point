<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Game Point</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0d1117; color: #e6edf3; font-family: Arial, sans-serif;
       display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 16px; }

/* --- Ecran de démarrage --- */
#setup { text-align: center; padding: 40px 20px; }
#setup h2 { font-size: 28px; margin-bottom: 20px; color: #58a6ff; }
#setup label { font-size: 16px; display: block; margin-bottom: 12px; }
#setup input { width: 70px; padding: 6px 10px; background: #161b22; color: #e6edf3;
               border: 1px solid #30363d; border-radius: 6px; font-size: 16px; text-align: center; }
#startBtn { margin-top: 20px; padding: 12px 36px; background: #238636; color: white;
            border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
#startBtn:hover { background: #2ea043; }

/* --- HUD en jeu --- */
#game { display: none; flex-direction: column; align-items: center; gap: 10px; }
#hud  { display: flex; gap: 24px; align-items: center; flex-wrap: wrap; justify-content: center; }

.score-box  { padding: 8px 16px; border-radius: 8px; font-size: 15px; font-weight: bold; }
.score-blue { background: rgba(88,166,255,0.15); border: 1px solid #58a6ff; color: #58a6ff; }
.score-red  { background: rgba(255,80,80,0.15);  border: 1px solid #ff5050; color: #ff5050; }
.score-box span { font-size: 22px; }

#turnBadge  { padding: 6px 16px; border-radius: 20px; font-size: 14px; font-weight: bold; }
.turn-blue  { background: #58a6ff; color: #0d1117; }
.turn-red   { background: #ff5050; color: #0d1117; }

#btnRow { display: flex; gap: 10px; }
button.btn       { padding: 7px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; }
.btn-end:hover   { background: #f85149; }
.btn-save:hover  { background: #2ea043; }
.btn-load:hover  { background: #d29922; }
.btn-end  { background: #da3633; color: white; }
.btn-save { background: #238636; color: white; }
.btn-load { background: #9e6a03; color: white; }

#info  { font-size: 12px; color: #8b949e; text-align: center; }
canvas { display: block; cursor: crosshair; border: 1px solid #21262d; border-radius: 4px; }

/* --- Modal fin de partie --- */
#overlay         { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 50;
                   align-items: center; justify-content: center; }
#overlay.visible { display: flex; }
#modal           { background: #161b22; border: 1px solid #30363d; border-radius: 12px;
                   padding: 32px 40px; text-align: center; max-width: 380px; }
#modal h2        { font-size: 22px; margin-bottom: 12px; }
#modal p         { color: #8b949e; margin-bottom: 20px; }
#modal button    { padding: 10px 30px; background: #238636; color: white;
                   border: none; border-radius: 6px; font-size: 15px; cursor: pointer; }
</style>
</head>
<body>

<!-- ===================== ECRAN DE DEMARRAGE ===================== -->
<div id="setup">
  <h2>Game Point</h2>
  <label>Taille de la grille :
    <input type="number" id="gridSize" min="5" max="30">
  </label>
  <p style="color:#8b949e;font-size:13px;margin-top:8px;">Recommande : 9 a 18 cases</p>
  <button id="startBtn" onclick="startGame()">Demarrer</button>
</div>

<!-- ===================== ECRAN DE JEU ===================== -->
<div id="game">
  <div id="hud">
    <div class="score-box score-blue">Bleu : <span id="sBlue">0</span></div>
    <div id="turnBadge" class="turn-blue">Tour : BLEU</div>
    <div class="score-box score-red">Rouge : <span id="sRed">0</span></div>
    <div id="btnRow">
      <button class="btn btn-save" onclick="saveGame()">Sauvegarder</button>
      <button class="btn btn-load" onclick="loadGame()">Charger</button>
      <button class="btn btn-end"  onclick="endGame()">Terminer</button>
    </div>
  </div>
  <div id="info"></div>
  <canvas id="c"></canvas>
</div>

<!-- ===================== MODAL FIN DE PARTIE ===================== -->
<div id="overlay">
  <div id="modal">
    <h2 id="mTitle"></h2>
    <p  id="mBody"></p>
    <button onclick="closeModal()">OK</button>
  </div>
</div>

<script>
/* ================================================================
   CONFIG — Tous les paramètres modifiables ici
   ================================================================ */
const CONFIG = {
  // Grille
  gridSizeDefault : 12,    // taille par défaut au démarrage
  gridSizeMin     : 5,     // taille minimale autorisée
  gridSizeMax     : 30,    // taille maximale autorisée

  // Règle de victoire
  alignLength     : 5,     // nombre de points consécutifs pour un alignement

  // Canon
  powerMin        : 1,     // puissance minimale (Ctrl+powerMin)
  powerMax        : 9,     // puissance maximale (Ctrl+powerMax)

  // Animation balle
  ballFrames      : 45,    // durée de l'animation en frames (plus = plus lent)
  ballRadius      : 7,     // rayon de la balle en pixels
  ballAmplitude   : 0.25,  // amplitude de la sinusoide (fraction de la distance)
  ballFrequency   : 4,     // nombre de lobes de la sinusoide
  ballColor       : '#ffd700',
  ballGlow        : 18,    // intensité du halo (shadowBlur)

  // Rendu
  cellSize        : 38,    // taille d'une case en pixels
  padding         : 52,    // marge autour de la grille
  cannonWidth     : 14,

  // Couleurs joueurs  (modifiable si le prof demande d'autres couleurs)
  colorBlue       : '#58a6ff',
  colorRed        : '#ff5050',
  colorProtected  : '#f0c000',  // bordure dorée des points protégés
  colorGrid       : '#21262d',
  colorBackground : '#0d1117',
  colorHighlight  : 0.18,       // opacité du fond des cases alignées

  // API backend
  apiBase         : '/api',
  saveSlot        : 'default',  // nom du slot de sauvegarde MongoDB
};

/* ================================================================
   ETAT DU JEU
   ================================================================ */
let N;          // taille de la grille (NxN)
let grid;       // tableau 2D : 0=vide, 1=bleu, 2=rouge
let canRow;     // position verticale de chaque canon [bleu, rouge]
let scores;     // nombre d'alignements réalisés [bleu, rouge]
let alignSet;   // Set des cellules "r,c" qui font partie d'un alignement
let turn;       // joueur actif : 0=bleu, 1=rouge
let busy;       // true pendant l'animation de balle (bloque les inputs)
let canvas, ctx;

/* ================================================================
   DEMARRAGE
   ================================================================ */
function startGame() {
  const input = document.getElementById('gridSize');
  N = Math.max(CONFIG.gridSizeMin,
      Math.min(CONFIG.gridSizeMax, parseInt(input.value) || CONFIG.gridSizeDefault));

  grid     = Array.from({length: N}, () => new Array(N).fill(0));
  canRow   = [Math.floor(N / 2), Math.floor(N / 2)];
  scores   = [0, 0];
  alignSet = new Set();
  turn     = 0;
  busy     = false;

  canvas = document.getElementById('c');
  ctx    = canvas.getContext('2d');
  canvas.width  = N * CONFIG.cellSize + CONFIG.padding * 2;
  canvas.height = N * CONFIG.cellSize + CONFIG.padding * 2;

  document.getElementById('setup').style.display = 'none';
  document.getElementById('game').style.display  = 'flex';

  canvas.onclick     = onClickCanvas;
  document.onkeydown = onKey;

  draw();
  updateHUD();
}

/* ================================================================
   HELPERS GEOMETRIE
   ================================================================ */
function colX(c) { return CONFIG.padding + c * CONFIG.cellSize + CONFIG.cellSize / 2; }
function rowY(r) { return CONFIG.padding + r * CONFIG.cellSize + CONFIG.cellSize / 2; }

// Convertit une puissance (1 à powerMax) en index de colonne (0 à N-1)
function powerToCol(p) {
  const range = CONFIG.powerMax - CONFIG.powerMin;
  return Math.round((p - CONFIG.powerMin) / range * (N - 1));
}

/* ================================================================
   LOGIQUE — ALIGNEMENTS & SCORE
   ================================================================ */
const DIRS = [[0,1],[1,0],[1,1],[1,-1]]; // horizontal, vertical, diagonales

function recompute() {
  // 1. Reconstruire le set des cellules protegees
  alignSet = new Set();
  const L  = CONFIG.alignLength;

  for (let r = 0; r < N; r++) {
    for (let c = 0; c < N; c++) {
      const v = grid[r][c];
      if (!v) continue;
      for (const [dr, dc] of DIRS) {
        let cells = [], ok = true;
        for (let k = 0; k < L; k++) {
          const nr = r + dr * k, nc = c + dc * k;
          if (nr < 0 || nr >= N || nc < 0 || nc >= N || grid[nr][nc] !== v) { ok = false; break; }
          cells.push(`${nr},${nc}`);
        }
        if (ok) cells.forEach(k => alignSet.add(k));
      }
    }
  }

  // 2. Compter les alignements distincts par joueur
  scores = [0, 0];
  for (let pl = 1; pl <= 2; pl++) {
    for (const [dr, dc] of DIRS) {
      for (let r = 0; r < N; r++) {
        for (let c = 0; c < N; c++) {
          if (grid[r][c] !== pl) continue;
          // Ignorer si ce n'est pas le debut de la sequence
          const pr = r - dr, pc = c - dc;
          if (pr >= 0 && pr < N && pc >= 0 && pc < N && grid[pr][pc] === pl) continue;
          // Compter la longueur
          let len = 0, nr = r, nc = c;
          while (nr >= 0 && nr < N && nc >= 0 && nc < N && grid[nr][nc] === pl) {
            len++; nr += dr; nc += dc;
          }
          if (len >= CONFIG.alignLength) scores[pl - 1]++;
        }
      }
    }
  }
}

/* ================================================================
   RENDU
   ================================================================ */
function draw() {
  const W = canvas.width, H = canvas.height;
  const C = CONFIG.cellSize, P = CONFIG.padding;

  ctx.clearRect(0, 0, W, H);

  // Fond
  ctx.fillStyle = CONFIG.colorBackground;
  ctx.fillRect(0, 0, W, H);

  // Lignes de grille
  ctx.strokeStyle = CONFIG.colorGrid;
  ctx.lineWidth   = 1;
  for (let i = 0; i <= N; i++) {
    ctx.beginPath(); ctx.moveTo(P + i*C, P); ctx.lineTo(P + i*C, P + N*C); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(P, P + i*C); ctx.lineTo(P + N*C, P + i*C); ctx.stroke();
  }

  // Numeros de colonnes
  ctx.fillStyle  = '#484f58';
  ctx.font       = '10px Arial';
  ctx.textAlign  = 'center';
  for (let c = 0; c < N; c++) ctx.fillText(c + 1, colX(c), P - 6);

  // Surlignage des cellules en alignement
  alignSet.forEach(k => {
    const [r, c] = k.split(',').map(Number);
    const base   = grid[r][c] === 1 ? CONFIG.colorBlue : CONFIG.colorRed;
    ctx.fillStyle = hexToRgba(base, CONFIG.colorHighlight);
    ctx.fillRect(P + c*C + 1, P + r*C + 1, C - 2, C - 2);
  });

  // Points des joueurs
  for (let r = 0; r < N; r++) {
    for (let c = 0; c < N; c++) {
      const v = grid[r][c];
      if (!v) continue;
      const prot = alignSet.has(`${r},${c}`);
      ctx.beginPath();
      ctx.arc(colX(c), rowY(r), C * 0.32, 0, Math.PI * 2);
      ctx.fillStyle = v === 1 ? CONFIG.colorBlue : CONFIG.colorRed;
      ctx.fill();
      if (prot) {
        ctx.strokeStyle = CONFIG.colorProtected;
        ctx.lineWidth   = 2;
        ctx.stroke();
      }
    }
  }

  // Canons
  drawCannon(0);
  drawCannon(1);
}

function drawCannon(p) {
  const cy     = rowY(canRow[p]);
  const color  = p === 0 ? CONFIG.colorBlue : CONFIG.colorRed;
  const active = turn === p;
  const P      = CONFIG.padding;
  const CW     = CONFIG.cannonWidth;

  ctx.fillStyle   = color;
  ctx.strokeStyle = active ? CONFIG.colorProtected : CONFIG.colorGrid;
  ctx.lineWidth   = active ? 3 : 1;

  if (p === 0) {
    const cx = P - CW - 6;
    drawRoundRect(cx - 14, cy - 9, 28, 18, 4);
    ctx.fillRect(cx + 10, cy - 4, 16, 8);
    if (active) { ctx.fillStyle = CONFIG.colorProtected; drawArrow(cx - 16, cy, -1); }
  } else {
    const cx = P + N * CONFIG.cellSize + CW + 6;
    drawRoundRect(cx - 14, cy - 9, 28, 18, 4);
    ctx.fillRect(cx - 26, cy - 4, 16, 8);
    if (active) { ctx.fillStyle = CONFIG.colorProtected; drawArrow(cx + 16, cy, 1); }
  }
}

function drawRoundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y); ctx.arcTo(x + w, y,     x + w, y + r,     r);
  ctx.lineTo(x + w, y + h - r); ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h); ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);     ctx.arcTo(x, y,     x + r, y,     r);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
}

function drawArrow(x, y, dir) {
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x - dir * 10, y - 6);
  ctx.lineTo(x - dir * 10, y + 6);
  ctx.closePath();
  ctx.fill();
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

/* ================================================================
   INTERACTIONS — SOURIS & CLAVIER
   ================================================================ */
function onClickCanvas(e) {
  if (busy) return;
  const rect = canvas.getBoundingClientRect();
  const mx   = e.clientX - rect.left - CONFIG.padding;
  const my   = e.clientY - rect.top  - CONFIG.padding;
  const c    = Math.floor(mx / CONFIG.cellSize);
  const r    = Math.floor(my / CONFIG.cellSize);
  if (c < 0 || c >= N || r < 0 || r >= N || grid[r][c]) return;

  grid[r][c] = turn + 1;
  recompute();
  draw();
  nextTurn();
  updateHUD();
}

function onKey(e) {
  if (busy) return;
  if (e.key === 'ArrowUp') {
    canRow[turn] = Math.max(0, canRow[turn] - 1);
    draw(); updateHUD(); e.preventDefault();
  }
  if (e.key === 'ArrowDown') {
    canRow[turn] = Math.min(N - 1, canRow[turn] + 1);
    draw(); updateHUD(); e.preventDefault();
  }
  if (e.ctrlKey && e.key >= String(CONFIG.powerMin) && e.key <= String(CONFIG.powerMax)) {
    e.preventDefault();
    fire(powerToCol(parseInt(e.key)));
  }
}

/* ================================================================
   TIR DU CANON
   ================================================================ */
function fire(targetCol) {
  const opp       = turn === 0 ? 2 : 1;
  const targetRow = canRow[turn];

  animateBall(targetRow, targetCol, () => {
    if (grid[targetRow][targetCol] === opp) {
      if (alignSet.has(`${targetRow},${targetCol}`)) {
        showToast('Point protege - alignement en cours');
      } else {
        grid[targetRow][targetCol] = 0;
        recompute();
      }
    }
    nextTurn();
    draw();
    updateHUD();
  });
}

/* ================================================================
   ANIMATION DE LA BALLE
   ================================================================ */
function animateBall(tr, tc, callback) {
  busy = true;
  const sx  = turn === 0 ? CONFIG.padding - 20 : CONFIG.padding + N * CONFIG.cellSize + 20;
  const sy  = rowY(canRow[turn]);
  const ex  = colX(tc);
  const ey  = rowY(tr);
  const F   = CONFIG.ballFrames;
  let f     = 0;

  const dx  = ex - sx, dy = ey - sy;
  const len = Math.sqrt(dx * dx + dy * dy) || 1;
  const amp = Math.min(len * CONFIG.ballAmplitude, CONFIG.cellSize * 2.5);

  function step() {
    f++;
    const t    = f / F;
    const lx   = sx + dx * t;
    const ly   = sy + dy * t;
    const perp = Math.sin(t * Math.PI * CONFIG.ballFrequency) * amp * (1 - t);
    const px   = -dy / len * perp;
    const py   =  dx / len * perp;

    draw();
    ctx.beginPath();
    ctx.arc(lx + px, ly + py, CONFIG.ballRadius, 0, Math.PI * 2);
    ctx.fillStyle   = CONFIG.ballColor;
    ctx.shadowColor = CONFIG.ballColor;
    ctx.shadowBlur  = CONFIG.ballGlow;
    ctx.fill();
    ctx.shadowBlur  = 0;

    if (f < F) requestAnimationFrame(step);
    else { busy = false; callback(); }
  }

  requestAnimationFrame(step);
}

/* ================================================================
   GESTION DES TOURS & HUD
   ================================================================ */
function nextTurn() { turn = 1 - turn; }

function updateHUD() {
  document.getElementById('sBlue').textContent = scores[0];
  document.getElementById('sRed').textContent  = scores[1];

  const badge = document.getElementById('turnBadge');
  if (turn === 0) { badge.textContent = 'Tour : BLEU';  badge.className = 'turn-blue'; }
  else            { badge.textContent = 'Tour : ROUGE'; badge.className = 'turn-red';  }

  // Colonnes atteignables selon la puissance
  const cols = [];
  for (let p = CONFIG.powerMin; p <= CONFIG.powerMax; p++) cols.push(powerToCol(p) + 1);
  const uniq = [...new Set(cols)].sort((a, b) => a - b);

  document.getElementById('info').textContent =
    `Clic: placer  |  Fleches haut/bas: viser (rangee ${canRow[turn] + 1})  |  Ctrl+${CONFIG.powerMin}-${CONFIG.powerMax}: tirer  |  Colonnes atteignables: ${uniq.join(', ')}`;
}

function showToast(msg) {
  document.getElementById('info').textContent = msg;
  setTimeout(updateHUD, 2500);
}

/* ================================================================
   FIN DE PARTIE
   ================================================================ */
function endGame() {
  let winner;
  if      (scores[0] > scores[1]) winner = 'Bleu gagne !';
  else if (scores[1] > scores[0]) winner = 'Rouge gagne !';
  else                             winner = 'Egalite !';

  document.getElementById('mTitle').textContent = winner;
  document.getElementById('mBody').textContent  =
    `Bleu : ${scores[0]} alignement(s) — Rouge : ${scores[1]} alignement(s)`;
  document.getElementById('overlay').classList.add('visible');
}

function closeModal() {
  document.getElementById('overlay').classList.remove('visible');
}

/* ================================================================
   SAUVEGARDE / CHARGEMENT (Flask + MongoDB)
   ================================================================ */
async function saveGame() {
  const payload = { N, grid, canRow, scores, alignSet: [...alignSet], turn };
  try {
    const res = await fetch(`${CONFIG.apiBase}/save`, {
      method  : 'POST',
      headers : { 'Content-Type': 'application/json' },
      body    : JSON.stringify(payload),
    });
    const json = await res.json();
    showToast(json.ok ? 'Partie sauvegardee' : 'Erreur lors de la sauvegarde');
  } catch (e) {
    showToast('Erreur de connexion au serveur');
  }
}

async function loadGame() {
  try {
    const res  = await fetch(`${CONFIG.apiBase}/load`);
    const json = await res.json();
    if (!json.ok) { showToast(json.msg || 'Aucune sauvegarde'); return; }

    const s    = json.data;
    N          = s.N;
    grid       = s.grid;
    canRow     = s.canRow;
    scores     = s.scores;
    alignSet   = new Set(s.alignSet);
    turn       = s.turn;

    canvas.width  = N * CONFIG.cellSize + CONFIG.padding * 2;
    canvas.height = N * CONFIG.cellSize + CONFIG.padding * 2;

    draw();
    updateHUD();
    showToast('Partie chargee');
  } catch (e) {
    showToast('Erreur de connexion au serveur');
  }
}

/* ================================================================
   INIT — Remplir les valeurs par défaut du formulaire
   ================================================================ */
document.getElementById('gridSize').value = CONFIG.gridSizeDefault;
</script>
</body>
</html>
